name: "customer-support-env"
version: "0.1.0"
description: "A real-world Customer Support triage environment where an AI agent follows company policy to resolve tickets."
author: "Antigravity"
entry_point: "server.app:app"
tasks:
  - id: "easy_refund"
    description: "Triage a single defective-item refund request (within 30 days, has order ID)."
    difficulty: "easy"
  - id: "medium_triage"
    description: "Triage two tickets: one needing a replacement (>30 days old), one needing more info (missing order ID)."
    difficulty: "medium"
  - id: "hard_mixed"
    description: "Triage three tickets with mixed rules: VIP escalation override, replacement for old item, and missing order ID."
    difficulty: "hard"
